version: '3.8'

services:
  nginx-rtmp:
    image: tiangolo/nginx-rtmp:latest
    container_name: nginx-rtmp
    ports:
      - "1935:1935"    # RTMP 推流端口
      - "8889:8080"    # HTTP 播放端口（HLS）
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - ./hls:/tmp/hls  # HLS 片段存储目录（可持久化）
    restart: unless-stopped