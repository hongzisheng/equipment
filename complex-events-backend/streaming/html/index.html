    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>OBS 直播播放</title>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.10"></script>
        <style>
            body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
            video { border: 1px solid #ccc; background: #000; }
        </style>
    </head>
    <body>
        <h1>🎥 OBS 直播画面</h1>
        <video id="video" controls autoplay muted width="960" height="540"></video>
        <p>推流地址：<code>rtmp://你的IP:1935/live/mystream</code></p>
        <p>HLS 地址：<code>http://你的IP:8080/hls/mystream.m3u8</code></p>

        <script>
            const video = document.getElementById('video');
            // 注意：如果你在本地测试，用 localhost；如果是远程服务器，替换为公网 IP
            const streamUrl = 'http://10.252.22.175:8889/hls/mystream.m3u8';

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log("Autoplay blocked:", e));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari 支持原生 HLS
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(e => console.log("Autoplay blocked:", e));
                });
            } else {
                alert('你的浏览器不支持 HLS 播放，请使用 Chrome、Edge 或 Safari。');
            }
        </script>
    </body>
    </html>
